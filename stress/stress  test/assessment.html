<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>场景内嵌微评估答题页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        :root {
            --primary-color: #8a7bff;
            --secondary-color: #b3a7ff;
            --background-color: #f8f9fa;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: rgba(0, 0, 0, 0.5);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: flex-end;
            animation: fadeIn 0.5s ease-in-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(100%); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .assessment-container {
            background-color: white;
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 24px;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.1);
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        
        .header .title {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .header .progress {
            font-size: 14px;
            color: var(--text-secondary);
        }
        
        .scenario-review {
            background-color: var(--background-color);
            border-radius: var(--border-radius);
            padding: 16px;
            margin-bottom: 24px;
        }
        
        .scenario-review p {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin: 0;
        }
        
        .question-card {
            background-color: white;
            border-radius: var(--border-radius);
            padding: 20px;
            margin-bottom: 24px;
            box-shadow: var(--shadow);
        }
        
        .question-dimension {
            font-size: 12px;
            color: var(--primary-color);
            font-weight: 500;
            margin-bottom: 8px;
        }
        
        .question-text {
            font-size: 16px;
            color: var(--text-primary);
            line-height: 1.5;
            margin-bottom: 24px;
        }
        
        .slider-container {
            margin-bottom: 24px;
        }
        
        .slider {
            width: 100%;
            height: 60px;
            background: linear-gradient(to right, #ff6b6b, #feca57, #48dbfb);
            border-radius: 30px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
        }
        
        .slider-thumb {
            width: 40px;
            height: 40px;
            background-color: white;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            transition: all 0.3s ease;
        }
        
        .slider-thumb:hover {
            transform: translate(-50%, -50%) scale(1.1);
        }
        
        .slider-labels {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
        }
        
        .slider-label {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        .button-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        
        .nav-button {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: var(--border-radius);
            background-color: white;
            font-size: 14px;
            color: var(--text-primary);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .nav-button:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        
        .nav-button:disabled {
            border-color: #e0e0e0;
            color: #999999;
            cursor: not-allowed;
        }
        
        .exit-button {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: var(--border-radius);
            background-color: white;
            font-size: 14px;
            color: #ff6b6b;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .exit-button:hover {
            border-color: #ff6b6b;
            background-color: rgba(255, 107, 107, 0.05);
        }
    </style>
</head>
<body>
    <div class="assessment-container">
        <!-- 顶部区：场景回顾 + 答题进度 -->
        <div class="header">
            <div class="title">情景微评估</div>
            <div class="progress">1/5</div>
        </div>
        
        <div class="scenario-review">
            <p>场景回顾：老师突然点名让你回答问题，你感到心跳加速，手心出汗。</p>
        </div>
        
        <!-- 中部答题区 -->
        <div class="question-card">
            <div class="question-dimension">维度：压力水平</div>
            <div class="question-text">当老师点到你名字时，你感到的紧张程度如何？</div>
            
            <div class="slider-container">
                <div class="slider" onclick="moveSlider(event)">
                    <div class="slider-thumb" id="sliderThumb"></div>
                </div>
                <div class="slider-labels">
                    <div class="slider-label">完全不符合</div>
                    <div class="slider-label">中性</div>
                    <div class="slider-label">完全符合</div>
                </div>
            </div>
        </div>
        
        <!-- 底部按钮区 -->
        <div class="button-group">
            <button class="nav-button" disabled onclick="prevQuestion()">上一题</button>
            <button class="nav-button" onclick="nextQuestion()">下一题</button>
        </div>
        
        <button class="exit-button" onclick="exitAssessment()">退出答题</button>
    </div>
    
    <script>
        let currentQuestion = 1;
        const totalQuestions = 5;
        
        function moveSlider(event) {
            const slider = event.currentTarget;
            const rect = slider.getBoundingClientRect();
            const x = event.clientX - rect.left;
            const percentage = Math.max(0, Math.min(100, (x / rect.width) * 100));
            
            const thumb = document.getElementById('sliderThumb');
            thumb.style.left = `${percentage}%`;
        }
        
        function prevQuestion() {
            if (currentQuestion > 1) {
                currentQuestion--;
                updateQuestion();
            }
        }
        
        function nextQuestion() {
            if (currentQuestion < totalQuestions) {
                currentQuestion++;
                updateQuestion();
            } else {
                // 答完所有题目，跳转到保存结果确认弹窗
                window.location.href = 'save-modal.html';
            }
        }
        
        function updateQuestion() {
            document.querySelector('.progress').textContent = `${currentQuestion}/${totalQuestions}`;
            
            // 启用/禁用上一题按钮
            document.querySelectorAll('.nav-button')[0].disabled = currentQuestion === 1;
            
            // 这里可以根据当前题目更新问题内容
            // 实际应用中，会从题库中加载对应题目
        }
        
        function exitAssessment() {
            // 关闭弹窗，返回场景页
            window.location.href = 'scenario.html';
        }
    </script>
</body>
</html>
