<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 深度情绪对话页</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
        
        :root {
            --primary-color: #8a7bff;
            --secondary-color: #b3a7ff;
            --background-color: #f8f9fa;
            --text-primary: #333333;
            --text-secondary: #666666;
            --border-radius: 12px;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
        
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: var(--background-color);
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            box-sizing: border-box;
        }
        
        .status-bar {
            height: 44px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .status-bar .time {
            font-weight: 500;
            font-size: 14px;
        }
        
        .status-bar .icons {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .header {
            height: 44px;
            background-color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .header .back {
            font-size: 20px;
            color: var(--text-primary);
            cursor: pointer;
        }
        
        .header .title {
            font-size: 18px;
            font-weight: 500;
            color: var(--text-primary);
        }
        
        .chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        
        .message {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: var(--border-radius);
            line-height: 1.5;
        }
        
        .ai-message {
            align-self: flex-start;
            background-color: white;
            box-shadow: var(--shadow);
            border-bottom-left-radius: 4px;
        }
        
        .user-message {
            align-self: flex-end;
            background-color: var(--primary-color);
            color: white;
            box-shadow: var(--shadow);
            border-bottom-right-radius: 4px;
        }
        
        .message-content {
            font-size: 14px;
        }
        
        .message-time {
            font-size: 10px;
            color: #999999;
            margin-top: 4px;
            text-align: right;
        }
        
        .ai-message .message-time {
            text-align: left;
        }
        
        .input-area {
            background-color: white;
            border-top: 1px solid #e0e0e0;
            padding: 16px;
        }
        
        .quick-tags {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding-bottom: 8px;
        }
        
        .quick-tag {
            padding: 6px 12px;
            border: 1px solid #e0e0e0;
            border-radius: 16px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.3s ease;
        }
        
        .quick-tag:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }
        
        .input-container {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        
        .text-input {
            flex: 1;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: var(--border-radius);
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 120px;
        }
        
        .text-input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(138, 123, 255, 0.1);
        }
        
        .send-button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .send-button:hover {
            background-color: #7a6bff;
            transform: scale(1.1);
        }
        
        .send-button:disabled {
            background-color: #e0e0e0;
            cursor: not-allowed;
            transform: none;
        }
    </style>
</head>
<body>
    <!-- 状态栏 -->
    <div class="status-bar">
        <div class="time">9:41</div>
        <div class="icons">
            <i class="fa fa-signal"></i>
            <i class="fa fa-wifi"></i>
            <i class="fa fa-battery-full"></i>
        </div>
    </div>
    
    <!-- 顶部导航栏 -->
    <div class="header">
        <div class="back" onclick="goBack()"><i class="fa fa-arrow-left"></i></div>
        <div class="title">AI 压力倾诉疏导</div>
        <div></div>
    </div>
    
    <!-- 中部聊天消息气泡区 -->
    <div class="chat-container">
        <div class="ai-message message">
            <div class="message-content">你好！我是你的 AI 压力疏导助手。根据你刚才的评估结果，你的压力水平处于健康范围，这很好！你现在有什么想聊的吗？</div>
            <div class="message-time">9:30</div>
        </div>
        
        <div class="user-message message">
            <div class="message-content">我最近在准备考试，有时候会感到紧张，不知道该怎么办。</div>
            <div class="message-time">9:31</div>
        </div>
        
        <div class="ai-message message">
            <div class="message-content">考试前感到紧张是很正常的反应。你可以尝试一些放松技巧，比如深呼吸、冥想或者适当的运动。另外，制定合理的学习计划也有助于减轻压力。你觉得这些方法对你有帮助吗？</div>
            <div class="message-time">9:32</div>
        </div>
    </div>
    
    <!-- 底部输入区域 -->
    <div class="input-area">
        <div class="quick-tags">
            <div class="quick-tag" onclick="addQuickTag('焦虑')">焦虑</div>
            <div class="quick-tag" onclick="addQuickTag('紧张')">紧张</div>
            <div class="quick-tag" onclick="addQuickTag('烦躁')">烦躁</div>
            <div class="quick-tag" onclick="addQuickTag('放松')">放松</div>
        </div>
        
        <div class="input-container">
            <textarea class="text-input" placeholder="输入你的感受..." id="messageInput"></textarea>
            <div class="send-button" onclick="sendMessage()">
                <i class="fa fa-paper-plane"></i>
            </div>
        </div>
    </div>
    
    <script>
        function goBack() {
            window.location.href = 'result.html';
        }
        
        function addQuickTag(tag) {
            document.getElementById('messageInput').value = tag;
        }
        
        function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (message) {
                // 添加用户消息
                addUserMessage(message);
                
                // 清空输入框
                input.value = '';
                
                // 模拟 AI 回复
                setTimeout(() => {
                    addAIMessage('谢谢你的分享。我理解你的感受，这是很正常的。你可以尝试...');
                }, 1000);
            }
        }
        
        function addUserMessage(content) {
            const chatContainer = document.querySelector('.chat-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'user-message message';
            
            const now = new Date();
            const time = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            
            messageDiv.innerHTML = `
                <div class="message-content">${content}</div>
                <div class="message-time">${time}</div>
            `;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        function addAIMessage(content) {
            const chatContainer = document.querySelector('.chat-container');
            const messageDiv = document.createElement('div');
            messageDiv.className = 'ai-message message';
            
            const now = new Date();
            const time = `${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
            
            messageDiv.innerHTML = `
                <div class="message-content">${content}</div>
                <div class="message-time">${time}</div>
            `;
            
            chatContainer.appendChild(messageDiv);
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
        
        // 监听输入框变化，自动调整高度
        document.getElementById('messageInput').addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });
    </script>
</body>
</html>
