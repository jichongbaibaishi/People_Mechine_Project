<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保存评估结果</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="./memory.js"></script>
    <style>
        .modal-fade { animation: fadeIn 0.3s ease-out forwards; }
        .modal-slide { animation: slideUp 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0), opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
    <div class="fixed inset-0 bg-black/50 modal-fade" id="modalBg"></div>

    <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 relative z-10 modal-slide">
        <div class="text-center mb-6">
            <div class="w-16 h-16 bg-purple-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fa-solid fa-floppy-disk text-2xl text-purple-600"></i>
            </div>
            <h2 class="text-2xl font-bold text-gray-800">保存评估结果</h2>
            <p class="text-gray-500 mt-2">将本次压力评估结果存入长期记忆库</p>
        </div>

        <div class="space-y-4 mb-6">
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">结果名称</label>
                <input type="text" id="resultTitle" placeholder="例如：2025-01-01 压力评估"
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">备注描述（可选）</label>
                <textarea id="resultDesc" rows="2" placeholder="简单描述本次状态..."
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-purple-500 focus:border-purple-500 outline-none transition"></textarea>
            </div>
        </div>

        <div class="flex gap-3">
            <button onclick="viewResult()" class="flex-1 px-4 py-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300 transition font-medium">
                仅查看结果
            </button>
            <button onclick="saveResult()" class="flex-1 px-4 py-3 bg-purple-600 text-white rounded-lg hover:bg-purple-700 transition font-medium">
                保存并查看
            </button>
        </div>
    </div>

    <script>
        // 默认评估数据
        const mockData = {
            title: "",
            desc: "",
            score: 65,
            radar: [70, 50, 80, 60],
            visual: { level: "中度压力", suggest: "建议适当休息，调整作息" }
        };

        // 仅查看结果
        function viewResult() {
            sessionStorage.setItem("currentRecordId", "");
            location.href = "result.html";
        }

        // ✅【修复】删除了强制token校验，匿名模式直接可用
        async function saveResult() {
            try {
                const title = document.getElementById("resultTitle").value.trim();
                if (!title) {
                    alert("请输入结果名称！");
                    return;
                }

                // 组装数据
                mockData.title = title;
                mockData.desc = document.getElementById("resultDesc").value;

                // 调用保存接口
                const res = await memoryManager.saveRecord(mockData);
                if (res.code === 200) {
                    sessionStorage.setItem("currentRecordId", res.data.id);
                    alert("保存成功！");
                    location.href = "result.html";
                } else {
                    alert("保存失败：" + res.msg);
                }
            } catch (error) {
                console.error("保存报错：", error);
                alert("保存失败，请检查后端是否启动！");
            }
        }

        // 点击空白返回首页
        document.getElementById("modalBg").onclick = () => {
            location.href = "home.html";
        };
    </script>
</body>
</html>
