<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>历史记录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="./memory.js"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-4xl mx-auto p-4 md:p-6">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold text-gray-800">历史评估记录</h2>
            <button onclick="clearAll()" class="px-3 py-1 bg-red-500 text-white rounded-lg hover:bg-red-600">
                <i class="fa-solid fa-trash mr-1"></i> 清空全部
            </button>
        </div>

        <div id="recordList" class="space-y-3 mb-8"></div>

        <div class="bg-white rounded-2xl shadow p-6">
            <h3 class="text-lg font-semibold mb-4">压力变化趋势</h3>
            <div class="h-48"><canvas id="trendChart"></canvas></div>
        </div>

        <button onclick="location.href='home.html'"
            class="w-full mt-6 p-3 bg-gray-200 text-gray-700 rounded-lg hover:bg-gray-300">
            <i class="fa-solid fa-home mr-1"></i> 返回首页
        </button>
    </div>

    <script>
        let trendChart = null;

        function renderTrend(list) {
            const ctx = document.getElementById("trendChart").getContext('2d');
            if (trendChart) trendChart.destroy();

            const validList = list.filter(i => i.score !== undefined && i.score !== null);
            if (validList.length === 0) {
                trendChart = new Chart(ctx, {
                    type: 'line',
                    data: { labels: [], datasets: [] },
                    options: { responsive: true, maintainAspectRatio: false }
                });
                return;
            }

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: validList.map(i => {
                        const d = i.createdAt ? new Date(i.createdAt).toLocaleDateString('zh-CN') : (i.create_time || '--');
                        return d;
                    }),
                    datasets: [{
                        label: '压力评分',
                        data: validList.map(i => i.score),
                        borderColor: '#6d28d9',
                        backgroundColor: 'rgba(109,40,217,0.1)',
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { min: 0, max: 100 } }
                }
            });
        }

        async function renderList() {
            const list = await memoryManager.getRecords();
            const container = document.getElementById("recordList");
            container.innerHTML = "";

            if (list.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-gray-500">暂无历史记录</div>`;
                renderTrend([]);
                return;
            }

            list.forEach(item => {
                const displayTime = item.createdAt ? new Date(item.createdAt).toLocaleDateString('zh-CN') : (item.create_time || '--');
                const recordId = typeof item.id === 'string' ? '"' + item.id + '"' : item.id;
                container.innerHTML += `
                <div class="bg-white p-4 rounded-xl shadow flex justify-between items-center">
                    <div>
                        <div class="font-medium">${item.title || '未命名记录'}</div>
                        <div class="text-sm text-gray-500">${displayTime}</div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="viewRecord('${item.id}')" class="px-3 py-1 bg-purple-600 text-white rounded">查看</button>
                        <button onclick="deleteRecord('${item.id}')" class="px-3 py-1 bg-red-500 text-white rounded">删除</button>
                    </div>
                </div>`;
            });
            renderTrend(list);
        }

        function viewRecord(id) {
            sessionStorage.setItem("currentRecordId", id);
            location.href = "result.html";
        }

        async function deleteRecord(id) {
            if (!confirm("确定删除？")) return;
            await memoryManager.deleteRecord(id);
            renderList();
        }

        async function clearAll() {
            if (!confirm("确定清空所有记录？")) return;
            await memoryManager.clearAllRecords();
            renderList();
        }

        window.onload = renderList;
    </script>
</body>
</html>
